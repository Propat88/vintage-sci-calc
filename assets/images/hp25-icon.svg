<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Charcoal (HP-25 Body) -->
  <rect width="1024" height="1024" rx="160" fill="#121212"/>
  
  <!-- "Display" Area -->
  <rect x="150" y="250" width="724" height="250" rx="20" fill="#1A0000" stroke="#330000" stroke-width="10"/>
  
  <!-- LED Numbers "25" -->
  <text x="512" y="440" font-family="monospace" font-weight="bold" font-size="220" fill="#FF3333" text-anchor="middle" letter-spacing="10">25</text>
  
  <!-- HP Logo -->
  <text x="512" y="200" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#888888" text-anchor="middle" letter-spacing="15">HEWLETT · PACKARD</text>
  
  <!-- Shift Accents (f and g colors) -->
  <rect x="150" y="600" width="340" height="40" rx="10" fill="#FFB300"/> <!-- Gold -->
  <rect x="534" y="600" width="340" height="40" rx="10" fill="#0091EA"/> <!-- Blue -->
  
  <!-- Button-like details at the bottom -->
  <rect x="150" y="720" width="160" height="120" rx="15" fill="#333333"/>
  <rect x="338" y="720" width="160" height="120" rx="15" fill="#333333"/>
  <rect x="526" y="720" width="160" height="120" rx="15" fill="#333333"/>
  <rect x="714" y="720" width="160" height="120" rx="15" fill="#333333"/>
</svg>
